version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: gatepass_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: gatepass_v2
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-user_password}
      MYSQL_USER: gatepass_user
    volumes:
      - mysql_data:/var/lib/mysql
    restart: always
    networks:
      - gatepass-net

  redis:
    image: redis:alpine
    container_name: gatepass_redis
    restart: always
    networks:
      - gatepass-net

  backend:
    build: ./backend
    container_name: gatepass_backend
    volumes:
      - ./backend/static:/app/static
      - ./backend/uploads:/app/uploads
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-gatepass_user}:${MYSQL_PASSWORD:-user_password}@db:3306/gatepass_v2
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY}
      ALGORITHM: HS256
      DEBUG_MODE: "False"
    depends_on:
      - db
      - redis
    restart: always
    networks:
      - gatepass-net

  frontend:
    build: ./frontend
    container_name: gatepass_frontend
    ports:
      - "8080:80" # Apache proxies to 8080
    depends_on:
      - backend
    restart: always
    networks:
      - gatepass-net

  ai-face:
    build: ./ai_services/face_recognition
    container_name: gatepass_ai_face
    restart: always
    networks:
      - gatepass-net

networks:
  gatepass-net:
    driver: bridge

volumes:
  mysql_data:
