services:
  db:
    image: mysql:8.0
    container_name: gatepass_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: gatepass_v2
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-user_password}
      MYSQL_USER: gatepass_user
      TZ: Africa/Nairobi
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "gatepass_user", "-puser_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always
    networks:
      - gatepass-net

  redis:
    image: redis:alpine
    container_name: gatepass_redis
    environment:
      TZ: Africa/Nairobi
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: always
    networks:
      - gatepass-net

  backend:
    build:
      context: ./backend
      network: host
    container_name: gatepass_backend
    volumes:
      - ./backend/static:/app/static
      - ./backend/uploads:/app/uploads
    environment:
      DATABASE_URL: mysql+aiomysql://${MYSQL_USER:-gatepass_user}:${MYSQL_PASSWORD:-user_password}@db:3306/gatepass_v2
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-smartcampus_super_secret_key_2025_gatepass}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 43200
      DEBUG_MODE: "False"
      TZ: Africa/Nairobi
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - gatepass-net

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: gatepass_frontend
    ports:
      - "8080:80"
    environment:
      TZ: Africa/Nairobi
    depends_on:
      - backend
    restart: always
    networks:
      - gatepass-net

  ai-face:
    build:
      context: ./ai_services/face_recognition
      network: host
    container_name: gatepass_ai_face
    environment:
      TZ: Africa/Nairobi
    restart: always
    networks:
      - gatepass-net

networks:
  gatepass-net:
    driver: bridge

volumes:
  mysql_data:
