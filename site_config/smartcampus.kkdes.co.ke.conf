# ==============================================================================
# Apache VPS Configuration: smartcampus.kkdes.co.ke (SSL & Reverse Proxy)
# ==============================================================================
# Location on VPS: /etc/apache2/sites-available/smartcampus.kkdes.co.ke.conf
# Document Root: /var/www/smartcampus
#
# This configuration:
# 1. Automatically redirects all HTTP traffic (Port 80) to HTTPS (Port 443).
# 2. Proxies HTTPS traffic to the Dockerized frontend service running on Port 9613.
# 3. Supports WebSockets (ws://) for live scans, face recognition, and real-time logs.
# 4. Sets up proper PWA caching headers at the proxy layer.

# ------------------------------------------------------------------------------
# 1. HTTP Configuration (Port 80) - Redirects to HTTPS
# ------------------------------------------------------------------------------
<VirtualHost *:80>
    ServerName smartcampus.kkdes.co.ke
    ServerAlias www.smartcampus.kkdes.co.ke
    
    DocumentRoot /var/www/smartcampus

    # Force immediate redirect to HTTPS
    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [R=301,L]

    ErrorLog ${APACHE_LOG_DIR}/smartcampus_http_error.log
    CustomLog ${APACHE_LOG_DIR}/smartcampus_http_access.log combined
</VirtualHost>

# ------------------------------------------------------------------------------
# 2. HTTPS Configuration (Port 443) - SSL & Proxy to Port 9613
# ------------------------------------------------------------------------------
<IfModule mod_ssl.c>
<VirtualHost *:443>
    ServerName smartcampus.kkdes.co.ke
    ServerAlias www.smartcampus.kkdes.co.ke

    DocumentRoot /var/www/smartcampus

    # SSL Configuration
    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/smartcampus.kkdes.co.ke/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/smartcampus.kkdes.co.ke/privkey.pem

    # Proxy Settings
    ProxyPreserveHost On
    ProxyAddHeaders On

    # Forward normal HTTPS requests to the Docker frontend container (Port 9613)
    ProxyPass / http://127.0.0.1:9613/
    ProxyPassReverse / http://127.0.0.1:9613/

    # WebSocket Proxying - critical for PWA live features & real-time updates
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:9613/$1" [P,L]

    # Security & PWA headers
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "SAMEORIGIN"
    Header set Referrer-Policy "strict-origin-when-cross-origin"
    
    # Ensure Service Worker is not cached
    <FilesMatch "\.(js|manifest\.webmanifest)$">
        Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/smartcampus_ssl_error.log
    CustomLog ${APACHE_LOG_DIR}/smartcampus_ssl_access.log combined
</VirtualHost>
</IfModule>
