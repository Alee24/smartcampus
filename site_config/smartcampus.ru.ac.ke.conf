<VirtualHost *:80>
    ServerName smartcampus.ru.ac.ke
    ServerAlias www.smartcampus.ru.ac.ke

    ProxyPreserveHost On
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    # Allow WebSockets for AI API and real-time features
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:8080/$1" [P,L]

    ErrorLog ${APACHE_LOG_DIR}/smartcampus_error.log
    CustomLog ${APACHE_LOG_DIR}/smartcampus_access.log combined
</VirtualHost>
