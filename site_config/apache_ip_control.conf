# ==============================================================================
# Apache VPS Configuration: IP Access Allowed & Domain "smartcampus.kkh.co.ke" Blocked
# ==============================================================================
# Location on VPS: /etc/apache2/sites-available/smartcampus-ip-control.conf
#
# This configuration:
# 1. Catches requests for "smartcampus.kkh.co.ke" and rejects them (or redirects them).
# 2. Handles requests via the IP address "185.192.97.84" (or port 80 proxy) and forwards 
#    them to the Dockerized frontend at port 9613.
# 3. Preserves WebSockets for live face recognition / scans / real-time updates.

# ------------------------------------------------------------------------------
# SECTION 1: Block smartcampus.kkh.co.ke (Return 403 Forbidden or Redirect)
# ------------------------------------------------------------------------------
<VirtualHost *:80>
    ServerName smartcampus.kkh.co.ke
    ServerAlias www.smartcampus.kkh.co.ke

    # Option A: Block access with a 403 Forbidden error (Recommended)
    Redirect 403 /
    
    # Option B: Alternatively, redirect users to the raw IP address port:
    # Redirect permanent / http://185.192.97.84:9613/

    ErrorLog ${APACHE_LOG_DIR}/smartcampus_blocked_error.log
    CustomLog ${APACHE_LOG_DIR}/smartcampus_blocked_access.log combined
</VirtualHost>

# ------------------------------------------------------------------------------
# SECTION 2: Enable direct access via VPS IP address (185.192.97.84)
# ------------------------------------------------------------------------------
<VirtualHost *:80>
    ServerName 185.192.97.84
    # Also serves as the default catch-all for any direct IP or server hits
    ServerAlias *

    ProxyPreserveHost On
    ProxyAddHeaders On

    # Forward normal HTTP requests to the Docker frontend container (port 9613)
    ProxyPass / http://127.0.0.1:9613/
    ProxyPassReverse / http://127.0.0.1:9613/

    # WebSocket Proxying - critical for live PWA features & real-time updates
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://127.0.0.1:9613/$1" [P,L]

    # Set security & PWA headers at Apache level
    Header set X-Content-Type-Options "nosniff"
    Header set X-Frame-Options "SAMEORIGIN"
    Header set Referrer-Policy "strict-origin-when-cross-origin"

    ErrorLog ${APACHE_LOG_DIR}/smartcampus_ip_error.log
    CustomLog ${APACHE_LOG_DIR}/smartcampus_ip_access.log combined
</VirtualHost>

# ==============================================================================
# HOW TO INSTALL & ENABLE THIS ON YOUR VPS:
# ==============================================================================
#
# 1. SSH into your VPS:
#    ssh root@185.192.97.84
#
# 2. Enable Apache proxy, rewrite, and headers modules:
#    sudo a2enmod proxy proxy_http rewrite headers
#
# 3. Create/overwrite the configuration file:
#    sudo nano /etc/apache2/sites-available/smartcampus-ip-control.conf
#    (Paste this file's contents in it)
#
# 4. Disable any old virtual hosts:
#    sudo a2dissite 000-default.conf smartcampus.ru.ac.ke.conf
#
# 5. Enable this new configuration:
#    sudo a2ensite smartcampus-ip-control.conf
#
# 6. Test configuration and restart Apache:
#    sudo apache2ctl configtest
#    sudo systemctl restart apache2
# ==============================================================================
