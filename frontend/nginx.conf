server {
    listen 80 default_server;
    server_name _;

    # Access and Error logs to stdout/stderr for docker logs
    access_log /dev/stdout;
    error_log /dev/stdout debug;

    location / {
        add_header X-Debug-Proxy "SmartCampus-Nginx";
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Enable Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Disable buffering for faster response delivery
        proxy_buffering off;
    }

    # Correctly handle static and uploads by proxying to backend
    # Use ^~ to prevent regex blocks (like the one above) from matching
    location ^~ /static/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /uploads/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai-api {
        # Use resolver for dynamic resolution
        resolver 127.0.0.11 valid=30s;
        set $upstream_ai ai-face;
        rewrite ^/ai-api/(.*) /$1 break;
        proxy_pass http://$upstream_ai:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
