server {
    listen 80 default_server;
    server_name _;

    # Access and Error logs to stdout/stderr for docker logs
    access_log /dev/stdout;
    error_log /dev/stdout debug;

    # Support massive file uploads (ZIP of student photos)
    client_max_body_size 3G;
    proxy_read_timeout 3600s;
    proxy_connect_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_request_buffering off;

    # ── PWA / Security headers applied to ALL responses ──────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        add_header X-Debug-Proxy "SmartCampus-Nginx";
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;

        # Allow service worker to control the full scope
        add_header Service-Worker-Allowed "/";

        # Prevent index.html from being cached by the browser
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        expires off;
    }

    # ── PWA Manifest — explicit MIME type + no-cache so updates are instant ──
    location = /manifest.webmanifest {
        root /usr/share/nginx/html;
        default_type application/manifest+json;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # ── Service Worker — must never be cached ───────────────────────────
    location ~* (sw\.js|workbox-.+\.js)$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
        add_header Service-Worker-Allowed "/";
        expires off;
    }

    # Enable Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json application/manifest+json;
    gzip_disable "MSIE [1-6]\.";

    # Cache static assets (long-lived hashed filenames from Vite build)
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff2|woff|ttf)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /api {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Disable buffering for faster response delivery
        proxy_buffering off;
    }

    # Correctly handle static and uploads by proxying to backend
    # Use ^~ to prevent regex blocks (like the one above) from matching
    location ^~ /static/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location ^~ /uploads/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /ai-api {
        # Use resolver for dynamic resolution
        resolver 127.0.0.11 valid=30s;
        set $upstream_ai ai-face;
        rewrite ^/ai-api/(.*) /$1 break;
        proxy_pass http://$upstream_ai:8001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

