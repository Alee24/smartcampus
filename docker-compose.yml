services:
  db:
    image: mysql:8.0
    container_name: gatepass_db
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: gatepass_v2
      MYSQL_PASSWORD: user_password
      MYSQL_USER: gatepass_user
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3307:3306"
    networks:
      - gatepass-net
    restart: always

  redis:
    image: redis:alpine
    container_name: gatepass_redis
    networks:
      - gatepass-net
    restart: always

  backend:
    build: 
      context: ./backend
      network: host
    container_name: gatepass_backend
    volumes:
      - ./backend/static:/app/static
      - ./backend/uploads:/app/uploads
    ports:
      - "971:8000"
    environment:
      DATABASE_URL: mysql+aiomysql://gatepass_user:user_password@db:3306/gatepass_v2
      REDIS_URL: redis://redis:6379
      SECRET_KEY: ${SECRET_KEY:-supersecretkey_change_me_in_prod}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 43200
    depends_on:
      - db
      - redis
    networks:
      - gatepass-net
    restart: always

  frontend:
    build: 
      context: ./frontend
      network: host
    container_name: gatepass_frontend
    # Primary entry point for the entire application
    ports:
      - "9613:80"
    depends_on:
      - backend
    networks:
      - gatepass-net
    restart: always

networks:
  gatepass-net:
    driver: bridge

volumes:
  mysql_data:
