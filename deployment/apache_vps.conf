<VirtualHost *:80>
    ServerName smartcampus.ru.ac.ke
    ServerAdmin admin@smartcampus.ru.ac.ke

    # Redirect HTTP to HTTPS
    RewriteEngine On
    RewriteCond %{SERVER_NAME} =smartcampus.ru.ac.ke
    RewriteRule ^ https://%{SERVER_NAME}%{REQUEST_URI} [END,NE,R=permanent]
</VirtualHost>

<VirtualHost *:443>
    ServerName smartcampus.ru.ac.ke
    ServerAdmin admin@smartcampus.ru.ac.ke

    ProxyPreserveHost On
    ProxyRequests Off

    # Forward to Frontend Container (Listening on port 8080 on localhost)
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    # Forward direct API calls to Backend if needed (optional if frontend handles it)
    # ProxyPass /api http://127.0.0.1:8000/api
    # ProxyPassReverse /api http://127.0.0.1:8000/api

    ErrorLog ${APACHE_LOG_DIR}/smartcampus_error.log
    CustomLog ${APACHE_LOG_DIR}/smartcampus_access.log combined

    # SSL Configuration (To be handled by Certbot)
</VirtualHost>
