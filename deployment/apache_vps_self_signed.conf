<VirtualHost *:80>
    ServerName smartcampus.ru.ac.ke
    ServerAdmin admin@smartcampus.ru.ac.ke

    # Redirect all HTTP traffic to HTTPS
    RewriteEngine On
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName smartcampus.ru.ac.ke
    ServerAdmin admin@smartcampus.ru.ac.ke

    ProxyPreserveHost On
    ProxyRequests Off

    # Forward to Frontend Container (Listening on port 8080 on localhost)
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/smartcampus-selfsigned.crt
    SSLCertificateKeyFile /etc/ssl/private/smartcampus-selfsigned.key

    ErrorLog ${APACHE_LOG_DIR}/smartcampus_error.log
    CustomLog ${APACHE_LOG_DIR}/smartcampus_access.log combined
</VirtualHost>
