<VirtualHost *:80>
    ServerName smartcampus.ru.ac.ke
    ServerAdmin admin@smartcampus.ru.ac.ke

    DocumentRoot /var/www/html

    # Redirect all HTTP traffic to HTTPS, except Let's Encrypt validation
    RewriteEngine On
    RewriteCond %{REQUEST_URI} !^/\.well-known/acme-challenge
    RewriteRule ^(.*)$ https://%{HTTP_HOST}$1 [R=301,L]
</VirtualHost>

<VirtualHost *:443>
    ServerName smartcampus.ru.ac.ke
    ServerAdmin admin@smartcampus.ru.ac.ke

    ProxyPreserveHost On
    ProxyRequests Off

    # Forward to Frontend Container (Listening on port 8080 on localhost)
    ProxyPass / http://127.0.0.1:8080/
    ProxyPassReverse / http://127.0.0.1:8080/

    SSLEngine on
    SSLCertificateFile /etc/letsencrypt/live/smartcampus.ru.ac.ke/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/smartcampus.ru.ac.ke/privkey.pem

    ErrorLog ${APACHE_LOG_DIR}/smartcampus_error.log
    CustomLog ${APACHE_LOG_DIR}/smartcampus_access.log combined
</VirtualHost>
